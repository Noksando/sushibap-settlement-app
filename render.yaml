services:
  - type: web
    name: sushibap-settlement-app
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_FILE
        value: /var/data/store.json
    disk:
      name: settlement-data
      mountPath: /var/data
      sizeGB: 1
